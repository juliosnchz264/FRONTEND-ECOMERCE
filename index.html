<!doctype html>
<html lang="es" data-theme="lofi">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/logo.svg" />
        <link rel="apple-touch-icon" sizes="192x192" href="/logo-192.png" />
        <link rel="manifest" href="/manifest.json" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#8B5CF6" />

        <!-- SEO primary -->
        <title>TazaShop | Tazas y Mugs artesanales online</title>
        <meta
            name="description"
            content="Descubre nuestra colección de tazas y mugs únicos. Diseños artesanales, personalizables y de calidad. Envío gratis en compras mayores a 40€."
        />
        <meta
            name="keywords"
            content="tazas, mugs, tazas artesanales, tazas personalizadas, tazas de cerámica, regalos originales, tienda online"
        />
        <meta name="author" content="TazaShop" />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="https://tusitio.com/" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="TazaShop" />
        <meta property="og:url" content="https://tusitio.com/" />
        <meta property="og:title" content="TazaShop | Tazas y Mugs artesanales online" />
        <meta
            property="og:description"
            content="Descubre nuestra colección de tazas y mugs únicos. Diseños artesanales, personalizables y de calidad. Envío gratis en compras mayores a 40€."
        />
        <meta property="og:image" content="https://tusitio.com/og-image.jpg" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:locale" content="es_ES" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@tusitio" />
        <meta name="twitter:title" content="TazaShop | Tazas y Mugs artesanales online" />
        <meta
            name="twitter:description"
            content="Descubre nuestra colección de tazas y mugs únicos. Diseños artesanales y personalizables."
        />
        <meta name="twitter:image" content="https://tusitio.com/og-image.jpg" />

        <!-- JSON-LD structured data -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "OnlineStore",
            "name": "TazaShop",
            "url": "https://tusitio.com",
            "logo": "https://tusitio.com/logo-512.png",
            "description": "Tienda online de tazas y mugs artesanales y personalizados.",
            "currenciesAccepted": "EUR",
            "priceRange": "€€",
            "inLanguage": "es",
            "potentialAction": {
                "@type": "SearchAction",
                "target": {
                    "@type": "EntryPoint",
                    "urlTemplate": "https://tusitio.com/?search={search_term_string}"
                },
                "query-input": "required name=search_term_string"
            }
        }
        </script>

        <!-- Preconnect to external services -->
        <link rel="preconnect" href="https://res.cloudinary.com" />
        <link rel="dns-prefetch" href="https://res.cloudinary.com" />

        <!-- Dark mode + FOUC prevention -->
        <script>
            ;(function () {
                try {
                    const savedTheme = localStorage.getItem('theme')
                    const prefersDark = window.matchMedia(
                        '(prefers-color-scheme: dark)',
                    ).matches
                    const isDark =
                        savedTheme === 'dark' || (!savedTheme && prefersDark)

                    if (isDark) {
                        document.documentElement.classList.add('dark')
                    } else {
                        document.documentElement.classList.remove('dark')
                    }

                    const style = document.createElement('style')
                    style.textContent = '#root { opacity: 0; }'
                    document.head.appendChild(style)

                    window.addEventListener('load', () => {
                        setTimeout(() => {
                            style.remove()
                        }, 50)
                    })
                } catch (e) {
                    console.error('Error al aplicar tema:', e)
                }
            })()
        </script>

        <style>
            html,
            body {
                background-color: #ffffff;
                min-height: 100vh;
                transition: none !important;
            }
            html.dark,
            html.dark body {
                background-color: #111827;
            }
            #root {
                opacity: 0;
                transition: opacity 0.1s ease;
            }
            body.loaded #root {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <div id="modal-root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
